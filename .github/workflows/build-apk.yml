name: Build Android APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Set up Gradle and Wrapper
      run: |
        gradle wrapper --gradle-version 8.10.2
        chmod +x gradlew

    - name: Setup Environment Key Placeholders
      run: |
        echo "GEMINI_API_KEY=mock_key_for_compilation" > .env
        echo "STORE_PASSWORD=android" >> .env
        echo "KEY_PASSWORD=android" >> .env

    - name: Build Android Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VMedia-Studio-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
